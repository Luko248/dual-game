<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DUAL</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#05050a">
  <meta name="description" content="Two dots. One mind. Control two mirrored dots through endless gates.">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DUAL">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">

  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="game"></div>

  <!-- HTML/CSS UI overlay — sits above the Phaser canvas -->
  <div id="ui-overlay">
    <div id="ui-inner">

      <!-- ═══ MENU SCREEN ═══ -->
      <div id="menu-ui" class="ui-hidden">
        <div id="menu-header">
          <div id="menu-title">DUAL</div>
          <div id="menu-tagline">Two dots. One mind.</div>
        </div>

        <div id="menu-card">
          <div id="menu-howto-header">HOW TO PLAY</div>

          <div class="menu-row">
            <span class="menu-row-label">thumbs apart</span>
            <span class="menu-row-arrow">&#8594;</span>
            <span class="menu-row-value">spread</span>
          </div>
          <div class="menu-row">
            <span class="menu-row-label">thumbs together</span>
            <span class="menu-row-arrow">&#8594;</span>
            <span class="menu-row-value">gather</span>
          </div>
          <div id="menu-survive">Both dots must survive.</div>

          <div class="menu-divider"></div>

          <div id="menu-powerups-header">POWER-UPS</div>
          <div class="menu-power-row">
            <div id="menu-ghost-icon"></div>
            <span class="menu-power-name menu-power-ghost">GHOST</span>
            <span class="menu-power-text">phase through a wall</span>
          </div>
          <div class="menu-power-row">
            <div id="menu-bullet-icon"></div>
            <span class="menu-power-name menu-power-bullet">BULLET</span>
            <span class="menu-power-text">slow time, 2 walls</span>
          </div>
        </div>

        <div id="menu-footer">
          <div id="menu-stats">
            <div id="menu-best"></div>
            <div id="menu-lvl"></div>
          </div>
          <button id="menu-advanced-btn" class="menu-btn menu-btn-advanced" type="button">
            ⚡ ADVANCED MODE
          </button>
          <div id="menu-buttons">
            <button id="menu-leaderboard-btn" class="menu-btn" type="button">LEADERBOARD</button>
            <button id="menu-mute-btn" class="menu-btn" type="button">SOUND ON</button>
          </div>
          <div id="menu-prompt">TAP TO PLAY</div>
        </div>
      </div>

      <!-- ═══ LEADERBOARD SCREEN ═══ -->
      <div id="leaderboard-ui" class="ui-hidden">
        <div id="lb-title">LEADERBOARD</div>
        <div id="lb-tabs">
          <button id="lb-tab-normal" class="lb-tab" type="button">NORMAL</button>
          <button id="lb-tab-advanced" class="lb-tab" type="button">ADVANCED</button>
        </div>
        <div id="lb-scope"></div>
        <div id="lb-you">
          <span id="lb-you-label">YOU</span>
          <input id="lb-name-input" type="text" maxlength="14" placeholder="enter name"
                 autocomplete="off" autocapitalize="off" spellcheck="false" />
        </div>
        <div id="lb-list"></div>
        <div id="lb-status"></div>
        <button id="lb-back" class="menu-btn" type="button">BACK</button>
      </div>

      <!-- ═══ GAME HUD ═══ -->
      <div id="game-hud" class="ui-hidden">
        <div id="hud-best-banner">NEW BEST</div>
        <div id="hud-score">0</div>
        <div id="hud-combo"></div>
        <!-- Ghost charges indicator (top-left) -->
        <div id="hud-ghost" class="ui-hidden">
          <div id="hud-ghost-icon"></div>
          <div id="hud-ghost-count">1</div>
        </div>
        <!-- Bullet time indicator (top-right) -->
        <div id="hud-bullet" class="ui-hidden">
          <div id="hud-bullet-timer">3.0</div>
          <div id="hud-bullet-icon"></div>
        </div>
        <!-- Joystick indicators -->
        <div id="joystick-left" class="joystick">
          <div class="joystick-knob" id="joystick-left-knob"></div>
        </div>
        <div id="joystick-right" class="joystick">
          <div class="joystick-knob" id="joystick-right-knob"></div>
        </div>
      </div>

      <!-- ═══ INTRO HINT (shown first 3s) ═══ -->
      <div id="intro-hint" class="ui-hidden">
        <div id="intro-label">SLIDE THUMBS &#8592; &#8594;</div>
      </div>

      <!-- ═══ THEME BANNER (centered, no container needed) ═══ -->
      <div id="game-banner" class="ui-hidden">
        <div id="banner-theme"></div>
        <div id="banner-level"></div>
      </div>

      <!-- ═══ POWER-UP PICKUP ALERTS ═══ -->
      <div id="ghost-alert" class="ui-hidden">CAN PASS THROUGH WALL</div>
      <div id="bullet-alert" class="ui-hidden">BULLET TIME!!!</div>

      <!-- ═══ GAME OVER ═══ -->
      <div id="gameover-ui" class="ui-hidden">
        <div id="go-title">GAME OVER</div>
        <div id="go-score"></div>
        <div id="go-best"></div>
        <div id="go-combo"></div>
        <div id="go-level"></div>
        <div id="go-retry">TAP TO RETRY</div>
      </div>

    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
